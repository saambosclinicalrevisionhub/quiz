name: Update Quiz

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-quiz
  cancel-in-progress: false

jobs:
  update-quiz:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: |
          pip install requests playwright
          python -m playwright install --with-deps chromium

      - name: Generate quiz questions
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/generate_questions.py

      - name: Commit updated quiz data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/questions.json data/metadata.json data/crawl_log.json data/click_log.json data/source_pages.json

          if git diff --staged --quiet; then
            echo "No quiz data changes to commit."
            exit 0
          fi

          git commit -m "Update quiz questions"

          git pull --rebase origin main

          git push origin main
