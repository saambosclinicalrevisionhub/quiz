name: Update Quiz

on:
  schedule:
    - cron: "0 18 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-quiz:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: |
          pip install requests beautifulsoup4

      - name: Generate questions from SAAS clinical website
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cat > generate_questions.py << 'PY'
          import os
          import json
          import re
          import time
          import requests
          from bs4 import BeautifulSoup
          from urllib.parse import urljoin, urlparse
          from datetime import datetime, timezone

          START_URL = "https://clinical.saambulance.sa.gov.au/tabs/home"
          DOMAIN = "clinical.saambulance.sa.gov.au"
          MAX_PAGES = 80
          MODEL = "gemini-2.5-flash"

          api_key = os.environ.get("GEMINI_API_KEY")

          if not api_key:
              raise RuntimeError("GEMINI_API_KEY is missing. Add it in GitHub Secrets.")

          os.makedirs("data", exist_ok=True)

          def clean_url(url):
              return url.split("#")[0].rstrip("/")

          def is_internal(url):
              parsed = urlparse(url)
              return parsed.netloc == DOMAIN

          def html_to_text(html):
              soup = BeautifulSoup(html, "html.parser")

              for tag in soup(["script", "style", "nav", "footer", "header"]):
                  tag.decompose()

              text = soup.get_text(separator="\n")
              text = re.sub(r"\n{3,}", "\n\n", text)
              text = re.sub(r"[ \t]{2,}", " ", text)

              return text.strip()

          def crawl_site():
              visited = set()
              queue = [START_URL]
              pages = []

              while queue and len(pages) < MAX_PAGES:
                  url = clean_url(queue.pop(0))

                  if url in visited:
                      continue

                  visited.add(url)

                  try:
                      print(f"Crawling: {url}")
                      response = requests.get(
                          url,
                          timeout=30,
                          headers={
                              "User-Agent": "SAAS Clinical Revision Quiz educational crawler"
                          }
                      )
                      response.raise_for_status()
                  except Exception as e:
                      print(f"Failed to crawl {url}: {e}")
                      continue

                  html = response.text
                  soup = BeautifulSoup(html, "html.parser")
                  title = soup.title.get_text(strip=True) if soup.title else url
                  text = html_to_text(html)

                  if len(text) > 500:
                      pages.append({
                          "title": title,
                          "url": url,
                          "text": text[:8000]
                      })

                  for link in soup.find_all("a", href=True):
                      next_url = clean_url(urljoin(url, link["href"]))

                      if is_internal(next_url) and next_url not in visited and next_url not in queue:
                          queue.append(next_url)

                  time.sleep(0.4)

              return pages

          def extract_json_from_text(text):
              text = text.strip()

              if text.startswith("```"):
                  text = re.sub(r"^```json", "", text, flags=re.IGNORECASE).strip()
                  text = re.sub(r"^```", "", text).strip()
                  text = re.sub(r"```$", "", text).strip()

              start = text.find("[")
              end = text.rfind("]")

              if start == -1 or end == -1:
                  return []

              possible_json = text[start:end+1]

              try:
                  return json.loads(possible_json)
              except Exception as e:
                  print("Could not parse Gemini JSON:", e)
                  print(text[:1000])
                  return []

          def ask_gemini(page):
              prompt = f"""
          You are creating a public formative revision quiz for paramedicine students.

          Use ONLY the source text supplied below.
          Do not use outside knowledge.
          Do not infer anything that is not explicitly stated in the source text.
          Do not create clinical advice.
          Do not create questions requiring users to apply treatment unless the answer is explicitly stated in the source text.

          Create exactly 4 quiz questions from this source page:
          - 2 multiple choice questions
          - 2 true/false questions

          Return ONLY valid JSON.
          Return a JSON array.
          Do not include markdown.
          Do not include explanations outside the JSON.

          Each multiple choice question must use this structure:
          {{
            "question": "question text",
            "type": "mcq",
            "options": ["option A", "option B", "option C", "option D"],
            "answer": "exact correct option text",
            "source": "source URL",
            "source_title": "source title"
          }}

          Each true/false question must use this structure:
          {{
            "question": "statement text",
            "type": "tf",
            "options": ["True", "False"],
            "answer": "True or False",
            "source": "source URL",
            "source_title": "source title"
          }}

          Source title:
          {page["title"]}

          Source URL:
          {page["url"]}

          Source text:
          {page["text"]}
          """

              endpoint = f"https://generativelanguage.googleapis.com/v1beta/models/{MODEL}:generateContent?key={api_key}"

              payload = {
                  "contents": [
                      {
                          "parts": [
                              {
                                  "text": prompt
                              }
                          ]
                      }
                  ],
                  "generationConfig": {
                      "temperature": 0.2,
                      "maxOutputTokens": 4096
                  }
              }

              try:
                  response = requests.post(endpoint, json=payload, timeout=90)
                  response.raise_for_status()
                  data = response.json()

                  text = data["candidates"][0]["content"]["parts"][0]["text"]
                  return extract_json_from_text(text)

              except Exception as e:
                  print(f"Gemini failed for {page['url']}: {e}")
                  return []

          def clean_questions(raw_questions):
              cleaned = []

              for q in raw_questions:
                  if not isinstance(q, dict):
                      continue

                  question = str(q.get("question", "")).strip()
                  qtype = str(q.get("type", "")).strip().lower()
                  answer = str(q.get("answer", "")).strip()
                  source = str(q.get("source", "")).strip()
                  source_title = str(q.get("source_title", "")).strip()

                  if not question or not answer or not source:
                      continue

                  if qtype not in ["mcq", "tf"]:
                      continue

                  options = q.get("options", [])

                  if qtype == "mcq":
                      if not isinstance(options, list) or len(options) != 4:
                          continue

                  if qtype == "tf":
                      options = ["True", "False"]
                      if answer not in ["True", "False"]:
                          continue

                  cleaned.append({
                      "question": question,
                      "type": qtype,
                      "options": options,
                      "answer": answer,
                      "source": source,
                      "source_title": source_title
                  })

              return cleaned

          print("Starting crawl...")
          pages = crawl_site()
          print(f"Crawled {len(pages)} pages.")

          all_questions = []

          for i, page in enumerate(pages, start=1):
              print(f"Generating questions for page {i}/{len(pages)}: {page['url']}")
              generated = ask_gemini(page)
              cleaned = clean_questions(generated)
              all_questions.extend(cleaned)
              time.sleep(1)

          if not all_questions:
              print("No questions generated. Keeping fallback question.")
              all_questions = [
                  {
                      "question": "The quiz generator ran, but no valid questions were produced.",
                      "type": "tf",
                      "options": ["True", "False"],
                      "answer": "True",
                      "source": START_URL,
                      "source_title": "Fallback"
                  }
              ]

          metadata = {
              "last_updated": datetime.now(timezone.utc).isoformat(),
              "source": START_URL,
              "page_count": len(pages),
              "question_count": len(all_questions)
          }

          with open("data/questions.json", "w", encoding="utf-8") as f:
              json.dump(all_questions, f, ensure_ascii=False, indent=2)

          with open("data/metadata.json", "w", encoding="utf-8") as f:
              json.dump(metadata, f, ensure_ascii=False, indent=2)

          print(f"Saved {len(all_questions)} questions.")
          PY

          python generate_questions.py

      - name: Commit updated quiz data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/questions.json data/metadata.json

          git diff --staged --quiet || git commit -m "Update quiz questions"

          git push
