name: Update Quiz

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-quiz:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: |
          pip install requests beautifulsoup4 playwright
          python -m playwright install chromium

      - name: Generate quiz questions
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cat > generate_questions.py << 'PY'
          import os
          import json
          import re
          import time
          import asyncio
          import requests
          from urllib.parse import urljoin, urlparse
          from datetime import datetime, timezone
          from playwright.async_api import async_playwright

          DOMAIN = "clinical.saambulance.sa.gov.au"

          START_URLS = [
              "https://clinical.saambulance.sa.gov.au/tabs/home",
              "https://clinical.saambulance.sa.gov.au/tabs/home/cardiac/page/acute-cardiogenic-pulmonary-oedema-p"
          ]

          MAX_PAGES = 20

          GEMINI_MODELS = [
              "gemini-2.5-flash",
              "gemini-2.0-flash",
              "gemini-1.5-flash"
          ]

          api_key = os.environ.get("GEMINI_API_KEY")

          if not api_key:
              raise RuntimeError("GEMINI_API_KEY is missing.")

          os.makedirs("data", exist_ok=True)

          def clean_url(url):
              return url.split("#")[0].rstrip("/")

          def is_internal(url):
              parsed = urlparse(url)
              return parsed.netloc == DOMAIN

          def useful_url(url):
              useful_parts = [
                  "/tabs/home",
                  "/page/",
                  "/cardiac/",
                  "/respiratory/",
                  "/trauma/",
                  "/medical/",
                  "/paediatric/",
                  "/paediatrics/",
                  "/obstetric/",
                  "/medicine/",
                  "/medicines/",
                  "/tools/",
                  "/calculators/"
              ]

              return any(part in url for part in useful_parts)

          async def get_rendered_page(browser, url):
              page = await browser.new_page()

              await page.goto(
                  url,
                  wait_until="networkidle",
                  timeout=60000
              )

              await page.wait_for_timeout(5000)

              text = await page.locator("body").inner_text(timeout=30000)

              links = await page.eval_on_selector_all(
                  "a[href]",
                  "els => els.map(a => a.href)"
              )

              title = await page.title()

              await page.close()

              return title, text, links

          async def crawl_site():
              visited = set()
              queue = [clean_url(u) for u in START_URLS]
              pages = []
              crawl_log = []

              async with async_playwright() as p:
                  browser = await p.chromium.launch(headless=True)

                  while queue and len(pages) < MAX_PAGES:
                      url = clean_url(queue.pop(0))

                      if url in visited:
                          continue

                      visited.add(url)

                      try:
                          print("Opening with browser:", url)
                          title, text, links = await get_rendered_page(browser, url)

                      except Exception as e:
                          msg = f"Failed to open {url}: {e}"
                          print(msg)
                          crawl_log.append(msg)
                          continue

                      text = text.strip()
                      text = re.sub(r"\n{3,}", "\n\n", text)
                      text = re.sub(r"[ \t]{2,}", " ", text)

                      msg = f"Extracted {len(text)} characters from {url}"
                      print(msg)
                      crawl_log.append(msg)

                      if len(text) > 100:
                          pages.append({
                              "title": title,
                              "url": url,
                              "text": text[:12000]
                          })
                      else:
                          print("Skipped because text was too short:", url)

                      for link in links:
                          link = clean_url(urljoin(url, link))

                          if (
                              is_internal(link)
                              and useful_url(link)
                              and link not in visited
                              and link not in queue
                          ):
                              queue.append(link)

                      await asyncio.sleep(0.5)

                  await browser.close()

              with open("data/crawl_log.json", "w", encoding="utf-8") as f:
                  json.dump(crawl_log, f, ensure_ascii=False, indent=2)

              with open("data/source_pages.json", "w", encoding="utf-8") as f:
                  json.dump(
                      [
                          {
                              "title": p["title"],
                              "url": p["url"],
                              "text_length": len(p["text"])
                          }
                          for p in pages
                      ],
                      f,
                      ensure_ascii=False,
                      indent=2
                  )

              return pages

          def extract_json(text):
              text = text.strip()

              text = re.sub(r"^```json", "", text, flags=re.IGNORECASE).strip()
              text = re.sub(r"^```", "", text).strip()
              text = re.sub(r"```$", "", text).strip()

              start = text.find("[")
              end = text.rfind("]")

              if start == -1 or end == -1:
                  print("No JSON array found in Gemini response.")
                  print(text[:1000])
                  return []

              try:
                  return json.loads(text[start:end + 1])
              except Exception as e:
                  print("JSON parse error:", e)
                  print(text[:1000])
                  return []

          def call_gemini(model, prompt):
              url = f"https://generativelanguage.googleapis.com/v1beta/models/{model}:generateContent?key={api_key}"

              payload = {
                  "contents": [
                      {
                          "parts": [
                              {
                                  "text": prompt
                              }
                          ]
                      }
                  ],
                  "generationConfig": {
                      "temperature": 0.1,
                      "maxOutputTokens": 4096
                  }
              }

              response = requests.post(url, json=payload, timeout=90)
              response.raise_for_status()
              data = response.json()

              return data["candidates"][0]["content"]["parts"][0]["text"]

          def generate_from_page(page):
              prompt = f"""
          Create quiz questions for undergraduate paramedicine revision.

          Use ONLY the source text below.
          Do not use outside knowledge.
          Do not infer anything not explicitly stated.
          Do not provide clinical advice.
          Do not create questions about facts not present in the source text.

          Create exactly 4 questions:
          - 2 multiple choice questions
          - 2 true/false questions

          Return ONLY valid JSON.
          Return a JSON array.
          Do not include markdown.

          Multiple choice JSON format:
          {{
            "question": "question text",
            "type": "mcq",
            "options": ["option A", "option B", "option C", "option D"],
            "answer": "exact correct option text",
            "source": "source URL",
            "source_title": "source title"
          }}

          True/false JSON format:
          {{
            "question": "statement text",
            "type": "tf",
            "options": ["True", "False"],
            "answer": "True or False",
            "source": "source URL",
            "source_title": "source title"
          }}

          Source title:
          {page["title"]}

          Source URL:
          {page["url"]}

          Source text:
          {page["text"]}
          """

              for model in GEMINI_MODELS:
                  try:
                      print(f"Trying Gemini model {model}")
                      response_text = call_gemini(model, prompt)
                      items = extract_json(response_text)

                      if items:
                          print(f"Model {model} produced {len(items)} questions.")
                          return items

                  except Exception as e:
                      print(f"Model {model} failed: {e}")

              return []

          def clean_questions(items):
              cleaned = []

              for item in items:
                  if not isinstance(item, dict):
                      continue

                  question = str(item.get("question", "")).strip()
                  qtype = str(item.get("type", "")).strip().lower()
                  answer = str(item.get("answer", "")).strip()
                  source = str(item.get("source", "")).strip()
                  source_title = str(item.get("source_title", "")).strip()
                  options = item.get("options", [])

                  if not question or not qtype or not answer or not source:
                      continue

                  if qtype == "mcq":
                      if not isinstance(options, list):
                          continue

                      options = [str(o).strip() for o in options if str(o).strip()]

                      if len(options) != 4:
                          continue

                      if answer not in options:
                          continue

                  elif qtype == "tf":
                      options = ["True", "False"]

                      if answer not in ["True", "False"]:
                          continue

                  else:
                      continue

                  cleaned.append({
                      "question": question,
                      "type": qtype,
                      "options": options,
                      "answer": answer,
                      "source": source,
                      "source_title": source_title
                  })

              return cleaned

          async def main():
              print("Starting browser-based crawl.")
              pages = await crawl_site()
              print(f"Crawled {len(pages)} usable pages.")

              all_questions = []

              for i, page in enumerate(pages, start=1):
                  print(f"Generating questions for page {i}/{len(pages)}: {page['url']}")

                  raw = generate_from_page(page)
                  valid = clean_questions(raw)

                  print(f"Kept {len(valid)} valid questions.")

                  all_questions.extend(valid)

                  time.sleep(1)

              if not all_questions:
                  all_questions = [
                      {
                          "question": "The quiz generator ran, but no valid questions were produced.",
                          "type": "tf",
                          "options": ["True", "False"],
                          "answer": "True",
                          "source": "https://clinical.saambulance.sa.gov.au/tabs/home",
                          "source_title": "Fallback"
                      }
                  ]

              metadata = {
                  "last_updated": datetime.now(timezone.utc).isoformat(),
                  "starting_urls": START_URLS,
                  "page_count": len(pages),
                  "question_count": len(all_questions)
              }

              with open("data/questions.json", "w", encoding="utf-8") as f:
                  json.dump(all_questions, f, ensure_ascii=False, indent=2)

              with open("data/metadata.json", "w", encoding="utf-8") as f:
                  json.dump(metadata, f, ensure_ascii=False, indent=2)

              print(f"Saved {len(all_questions)} questions.")

          asyncio.run(main())
          PY

          python generate_questions.py

      - name: Commit updated quiz data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/questions.json data/metadata.json data/crawl_log.json data/source_pages.json

          git diff --staged --quiet || git commit -m "Update quiz questions"

          git push
