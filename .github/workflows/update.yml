name: Update Quiz

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-quiz:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: |
          pip install requests playwright
          python -m playwright install --with-deps chromium

      - name: Generate quiz questions
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cat > generate_questions.py << 'PY'
          import os
          import json
          import re
          import time
          import asyncio
          import requests
          from urllib.parse import urljoin, urlparse
          from datetime import datetime, timezone
          from playwright.async_api import async_playwright

          DOMAIN = "clinical.saambulance.sa.gov.au"

          HOME_URL = "https://clinical.saambulance.sa.gov.au/tabs/home"
          MEDICINES_URL = "https://clinical.saambulance.sa.gov.au/tabs/medicines"
          CALCULATORS_URL = "https://clinical.saambulance.sa.gov.au/tabs/calculators"

          EXCLUDED_URL_PREFIXES = [
              "https://clinical.saambulance.sa.gov.au/tabs/checklists",
              "https://clinical.saambulance.sa.gov.au/tabs/checklists/cppro-s"
          ]

          START_URLS = [
              HOME_URL,
              MEDICINES_URL,
              CALCULATORS_URL,
              "https://clinical.saambulance.sa.gov.au/tabs/home/cardiac/page/acute-cardiogenic-pulmonary-oedema-p",
              "https://clinical.saambulance.sa.gov.au/tabs/home/trauma/page/amputations-p"
          ]

          CLINICAL_LEVELS = [
              "Ambulance Assist",
              "Ambulance Responder",
              "Ambulance Officer",
              "Ambulance Officer Extended Scope",
              "Paramedic",
              "Intensive Care Paramedic",
              "Extended Care Paramedic"
          ]

          MAX_PAGES_PER_LEVEL = 250
          QUESTIONS_PER_PAGE = 4

          GEMINI_MODELS = [
              "gemini-2.5-flash",
              "gemini-2.0-flash",
              "gemini-1.5-flash"
          ]

          api_key = os.environ.get("GEMINI_API_KEY")

          if not api_key:
              raise RuntimeError("GEMINI_API_KEY is missing.")

          os.makedirs("data", exist_ok=True)

          def clean_url(url):
              return url.split("#")[0].rstrip("/")

          def is_internal(url):
              parsed = urlparse(url)
              return parsed.netloc == DOMAIN

          def is_excluded_url(url):
              cleaned = clean_url(url)

              for prefix in EXCLUDED_URL_PREFIXES:
                  if cleaned.startswith(prefix):
                      return True

              return False

          def is_home_or_disclaimer_page(url):
              cleaned = clean_url(url)
              return cleaned == HOME_URL

          def categorise_url(url):
              cleaned = clean_url(url)

              if "/tabs/medicines" in cleaned:
                  return "Medicine"

              if "/tabs/calculators" in cleaned:
                  return "Calculator"

              if "/tabs/home" in cleaned and "/page/" in cleaned:
                  return "Clinical Practice Guideline"

              if "/tabs/home" in cleaned:
                  return "Clinical Practice Guideline"

              return "Other"

          def useful_url(url):
              if not is_internal(url):
                  return False

              if is_excluded_url(url):
                  return False

              useful_parts = [
                  "/tabs/home",
                  "/tabs/medicines",
                  "/tabs/calculators",
                  "/page/",
                  "/medicine/",
                  "/medicines/",
                  "/calculator/",
                  "/calculators/",
                  "/cardiac/",
                  "/respiratory/",
                  "/trauma/",
                  "/medical/",
                  "/paediatric/",
                  "/paediatrics/",
                  "/obstetric/"
              ]

              return any(part in url for part in useful_parts)

          def looks_like_disclaimer_text(text):
              lowered = text.lower()

              disclaimer_terms = [
                  "not intended to serve as health",
                  "medical or treatment advice",
                  "information purposes only",
                  "saas does not represent or warrant",
                  "to the maximum extent permitted by law",
                  "liability in negligence",
                  "external websites",
                  "does not endorse any external website",
                  "if any content contains links to your website"
              ]

              hits = sum(1 for term in disclaimer_terms if term in lowered)

              return hits >= 2

          async def select_clinical_level(page, level):
              selected = False

              print(f"Trying to select clinical level: {level}")

              try:
                  selectors = await page.locator("select").all()

                  for selector in selectors:
                      try:
                          await selector.select_option(label=level, timeout=3000)
                          selected = True
                          print(f"Selected {level} using dropdown label.")
                          break
                      except Exception:
                          pass
              except Exception:
                  pass

              if not selected:
                  try:
                      locator = page.get_by_text(level, exact=True)

                      if await locator.count() > 0:
                          await locator.first.click(timeout=7000)
                          selected = True
                          print(f"Selected {level} by clicking exact visible text.")
                  except Exception as e:
                      print(f"Could not click exact level text {level}: {e}")

              if not selected:
                  try:
                      locator = page.get_by_text(level, exact=False)

                      if await locator.count() > 0:
                          await locator.first.click(timeout=7000)
                          selected = True
                          print(f"Selected {level} by clicking partial visible text.")
                  except Exception as e:
                      print(f"Could not click partial level text {level}: {e}")

              await page.wait_for_timeout(4000)

              try:
                  await page.wait_for_load_state("networkidle", timeout=30000)
              except Exception:
                  pass

              return selected

          async def get_rendered_page(context, url, level):
              page = await context.new_page()

              await page.goto(
                  url,
                  wait_until="networkidle",
                  timeout=60000
              )

              await page.wait_for_timeout(3000)

              try:
                  await select_clinical_level(page, level)
              except Exception as e:
                  print(f"Level selector not applied on {url}: {e}")

              await page.wait_for_timeout(3000)

              text = await page.locator("body").inner_text(timeout=30000)

              links = await page.eval_on_selector_all(
                  "a[href]",
                  "els => els.map(a => a.href)"
              )

              title = await page.title()

              await page.close()

              return title, text, links

          async def initialise_level_context(browser, level):
              context = await browser.new_context()
              page = await context.new_page()

              selected = False
              home_text = ""
              links = []

              try:
                  await page.goto(
                      HOME_URL,
                      wait_until="networkidle",
                      timeout=60000
                  )

                  await page.wait_for_timeout(4000)

                  selected = await select_clinical_level(page, level)

                  home_text = await page.locator("body").inner_text(timeout=30000)

                  links = await page.eval_on_selector_all(
                      "a[href]",
                      "els => els.map(a => a.href)"
                  )

              except Exception as e:
                  print(f"Failed to initialise level context for {level}: {e}")

              await page.close()

              return context, selected, home_text, links

          async def crawl_for_level(browser, level):
              context, selected, home_text, starting_links = await initialise_level_context(browser, level)

