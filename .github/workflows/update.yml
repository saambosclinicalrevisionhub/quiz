<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SA Ambos Clinical Revision Hub</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: #f2f4f7;
      color: #222;
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.5;
    }

    body {
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      background: #ffffff;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.10);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 16px;
      color: #222;
      font-size: 32px;
    }

    .warning {
      background: #fff3cd;
      border-left: 5px solid #f0ad4e;
      padding: 14px;
      margin-bottom: 22px;
      border-radius: 4px;
    }

    .warning a {
      color: #005eb8;
      font-weight: bold;
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 16px;
      margin-bottom: 6px;
    }

    select {
      width: 100%;
      max-width: 420px;
      padding: 10px;
      font-size: 16px;
      border-radius: 6px;
      border: 1px solid #aaa;
      background: #ffffff;
    }

    button {
      padding: 10px 14px;
      font-size: 16px;
      margin-top: 14px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      background: #005eb8;
      color: #ffffff;
    }

    button:hover {
      background: #004b93;
    }

    button:disabled {
      background: #aaa;
      cursor: not-allowed;
    }

    .question-card {
      margin-top: 24px;
      padding: 20px;
      border: 1px solid #ddd;
      border-radius: 10px;
      background: #fafafa;
      min-height: 80px;
    }

    .option {
      display: block;
      width: 100%;
      text-align: left;
      margin: 8px 0;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      background: #ffffff;
      color: #222;
    }

    .option:hover {
      background: #eef5ff;
    }

    .option.correct {
      background: #d4edda;
      border-color: #28a745;
      color: #155724;
    }

    .option.incorrect {
      background: #f8d7da;
      border-color: #dc3545;
      color: #721c24;
    }

    .feedback {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      background: #eef3f8;
    }

    .source {
      margin-top: 16px;
      font-size: 14px;
      color: #555;
    }

    .source a {
      color: #005eb8;
      word-break: break-word;
    }

    .category {
      display: inline-block;
      margin-bottom: 10px;
      padding: 4px 8px;
      border-radius: 6px;
      background: #e9ecef;
      color: #333;
      font-size: 13px;
    }

    .status {
      color: #555;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>SA Ambos Clinical Revision Hub</h1>

    <div id="disclaimerBox" class="warning">
      <strong>Educational revision only.</strong><br>
      This quiz is AI-generated directly from content on the publicly available
      <a href="https://clinical.saambulance.sa.gov.au/tabs/home" target="_blank" rel="noopener">
        SA Ambulance Service Clinical website</a>.
      It is not clinical advice or operational advice, or a substitute for the SAAS Clinical website/App.
    </div>

    <label for="levelSelect">Select your clinical level</label>

    <select id="levelSelect">
